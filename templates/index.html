<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HPC Encrypted Inference</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
        max-width: 760px;
      }
      h1 {
        margin-bottom: 0.5rem;
      }
      form,
      .panel {
        border: 1px solid #ccc;
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
      }
      label {
        display: block;
        margin-top: 0.75rem;
        font-weight: bold;
      }
      input,
      textarea,
      select,
      button {
        width: 100%;
        margin-top: 0.35rem;
        padding: 0.5rem;
        box-sizing: border-box;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }
      button {
        cursor: pointer;
      }
      #status {
        font-family: Consolas, monospace;
        white-space: pre-wrap;
      }
      #preview {
        max-width: 100%;
        margin-top: 1rem;
        display: none;
      }
      #audioPreview {
        width: 100%;
        margin-top: 1rem;
        display: none;
      }
      #downloadLink {
        display: none;
        margin-top: 1rem;
      }
      .note {
        color: #444;
        font-size: 0.95rem;
      }
      .hidden {
        display: none !important;
      }
      #modelHint {
        margin-top: 0.5rem;
        font-style: italic;
      }
      optgroup {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>HPC Encrypted Inference</h1>
    <p class="note">
      Paste the session key from the login node console. Choose a model, fill the form,
      and submit — encryption happens in your browser before upload.
    </p>

    <form id="jobForm">
      <label for="sessionKey">Session key</label>
      <input
        id="sessionKey"
        name="sessionKey"
        type="password"
        autocomplete="off"
        placeholder="Paste key from login node console"
        required
      />

      <label for="model" id="modelLabel">Model</label>
      <select id="model" name="model" required></select>
      <p id="modelHint" class="note"></p>

      <div id="imagesRow">
        <label for="images" id="imagesLabel">Images</label>
        <input id="images" name="images" type="file" accept="image/*" multiple />
      </div>

      <div id="meshRow" class="hidden">
        <label for="mesh">3D mesh (GLB or OBJ)</label>
        <input id="mesh" name="mesh" type="file" accept=".glb,.gltf,.obj,model/gltf-binary" />
      </div>

      <label for="prompt" id="promptLabel">Prompt</label>
      <textarea id="prompt" name="prompt" rows="4" required></textarea>

      <div id="negativePromptRow">
        <label for="negative_prompt">Negative prompt</label>
        <textarea id="negative_prompt" name="negative_prompt" rows="2"></textarea>
      </div>

      <div class="grid" id="extraParams">
        <div id="audioDurationRow" class="hidden">
          <label for="audio_duration_s">Duration (seconds)</label>
          <input id="audio_duration_s" name="audio_duration_s" type="number" value="30" min="1" max="600" step="1" />
        </div>
        <div id="resolutionRow" class="hidden">
          <label for="resolution">Voxel resolution</label>
          <select id="resolution" name="resolution">
            <option value="512">512³</option>
            <option value="1024" selected>1024³</option>
            <option value="1536">1536³</option>
          </select>
        </div>
        <div id="textureSizeRow" class="hidden">
          <label for="texture_size">Texture size</label>
          <select id="texture_size" name="texture_size">
            <option value="2048">2048</option>
            <option value="4096" selected>4096</option>
          </select>
        </div>
      </div>

      <div class="grid" id="diffusionParams">
        <div>
          <label for="seed">Seed</label>
          <input id="seed" name="seed" type="number" value="0" />
        </div>
        <div>
          <label for="num_inference_steps">Inference steps</label>
          <input id="num_inference_steps" name="num_inference_steps" type="number" value="4" />
        </div>
        <div>
          <label for="guidance_scale">Guidance scale</label>
          <input id="guidance_scale" name="guidance_scale" type="number" value="1.0" step="0.1" />
        </div>
        <div id="trueCfgRow">
          <label for="true_cfg_scale">True CFG scale</label>
          <input id="true_cfg_scale" name="true_cfg_scale" type="number" value="1.0" step="0.1" />
        </div>
      </div>
      <button type="submit" id="submitBtn">Submit encrypted job</button>
    </form>

    <div class="panel">
      <strong>Status</strong>
      <div id="status">Loading models…</div>
      <img id="preview" alt="Decrypted result preview" />
      <audio id="audioPreview" controls></audio>
      <a id="downloadLink" download="result.glb">Download 3D result</a>
    </div>

    <script>
      const JOB_MAGIC = new TextEncoder().encode("HPCENC02");
      const OUT_MAGIC = "HPCOUT01";
      const KEY_LEN = 32;

      const CATEGORY_LABELS = {
        image_edit: "Image edit",
        text_to_image: "Text / image generation",
        image_to_3d: "Image to 3D",
        text_to_audio: "Text to audio",
        mesh_texture: "Mesh texture",
      };

      const form = document.getElementById("jobForm");
      const statusEl = document.getElementById("status");
      const previewEl = document.getElementById("preview");
      const audioPreviewEl = document.getElementById("audioPreview");
      const downloadLinkEl = document.getElementById("downloadLink");
      const submitBtn = document.getElementById("submitBtn");
      const modelSelect = document.getElementById("model");
      const imagesRow = document.getElementById("imagesRow");
      const imagesInput = document.getElementById("images");
      const imagesLabel = document.getElementById("imagesLabel");
      const meshRow = document.getElementById("meshRow");
      const meshInput = document.getElementById("mesh");
      const modelHint = document.getElementById("modelHint");
      const negativePromptRow = document.getElementById("negativePromptRow");
      const audioDurationRow = document.getElementById("audioDurationRow");
      const resolutionRow = document.getElementById("resolutionRow");
      const textureSizeRow = document.getElementById("textureSizeRow");
      const trueCfgRow = document.getElementById("trueCfgRow");
      const promptLabel = document.getElementById("promptLabel");
      const diffusionParams = document.getElementById("diffusionParams");

      let models = [];
      let currentJobId = null;
      let pollTimer = null;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function hideResults() {
        previewEl.style.display = "none";
        audioPreviewEl.style.display = "none";
        downloadLinkEl.style.display = "none";
      }

      function selectedModel() {
        return models.find((m) => m.id === modelSelect.value);
      }

      function setVisible(el, show) {
        el.classList.toggle("hidden", !show);
      }

      function updateModelUi() {
        const spec = selectedModel();
        if (!spec) return;
        const ui = spec.ui || {};
        const defaults = ui.defaults || {};

        modelHint.textContent = ui.hint || "";

        if (spec.image_mode === "required") {
          setVisible(imagesRow, true);
          imagesLabel.textContent = "Images (1 or 2, required)";
          imagesInput.required = true;
        } else if (spec.image_mode === "optional") {
          setVisible(imagesRow, true);
          imagesLabel.textContent = "Images (optional — for img2img / editing)";
          imagesInput.required = false;
        } else {
          setVisible(imagesRow, false);
          imagesInput.required = false;
          imagesInput.value = "";
        }

        if (ui.show_mesh || spec.requires_mesh) {
          setVisible(meshRow, true);
          meshInput.required = true;
        } else {
          setVisible(meshRow, false);
          meshInput.required = false;
          meshInput.value = "";
        }

        setVisible(negativePromptRow, !!ui.show_negative_prompt);
        setVisible(audioDurationRow, !!ui.show_audio_duration);
        setVisible(resolutionRow, !!ui.show_resolution);
        setVisible(textureSizeRow, spec.category === "mesh_texture");
        setVisible(trueCfgRow, !!ui.show_true_cfg);

        if (spec.category === "mesh_texture") {
          promptLabel.textContent = "Prompt (optional style hint)";
          document.getElementById("prompt").required = false;
        } else {
          promptLabel.textContent = "Prompt";
          document.getElementById("prompt").required = true;
        }

        if (spec.category === "text_to_audio") {
          diffusionParams.classList.remove("hidden");
        } else if (spec.category === "image_to_3d") {
          setVisible(trueCfgRow, false);
        }

        document.getElementById("num_inference_steps").value = String(
          defaults.num_inference_steps ?? 4
        );
        document.getElementById("guidance_scale").value = String(
          defaults.guidance_scale ?? 1.0
        );
        document.getElementById("true_cfg_scale").value = String(
          defaults.true_cfg_scale ?? 1.0
        );
        if (defaults.audio_duration_s != null) {
          document.getElementById("audio_duration_s").value = String(
            defaults.audio_duration_s
          );
        }
        if (defaults.resolution != null) {
          document.getElementById("resolution").value = String(defaults.resolution);
        }
        if (defaults.texture_size != null) {
          document.getElementById("texture_size").value = String(defaults.texture_size);
        }
      }

      async function loadModels() {
        const response = await fetch("/api/models");
        if (!response.ok) throw new Error("Could not load model list.");
        const body = await response.json();
        models = body.models;

        const byCategory = {};
        for (const m of models) {
          const cat = m.category || "other";
          if (!byCategory[cat]) byCategory[cat] = [];
          byCategory[cat].push(m);
        }

        modelSelect.innerHTML = "";
        const categoryOrder = [
          "image_edit",
          "text_to_image",
          "image_to_3d",
          "mesh_texture",
          "text_to_audio",
        ];
        for (const cat of categoryOrder) {
          const groupModels = byCategory[cat];
          if (!groupModels || !groupModels.length) continue;
          const group = document.createElement("optgroup");
          group.label = CATEGORY_LABELS[cat] || cat;
          for (const m of groupModels) {
            const opt = document.createElement("option");
            opt.value = m.id;
            opt.textContent = m.display_name;
            group.appendChild(opt);
          }
          modelSelect.appendChild(group);
        }
        for (const cat of Object.keys(byCategory)) {
          if (categoryOrder.includes(cat)) continue;
          for (const m of byCategory[cat]) {
            const opt = document.createElement("option");
            opt.value = m.id;
            opt.textContent = m.display_name;
            modelSelect.appendChild(opt);
          }
        }

        const showModelPicker = models.length > 1;
        document.getElementById("modelLabel").style.display = showModelPicker ? "block" : "none";
        modelSelect.style.display = showModelPicker ? "block" : "none";
        modelSelect.addEventListener("change", updateModelUi);
        updateModelUi();
        setStatus("Paste session key and submit a job.");
      }

      function parseSessionKey(b64) {
        const trimmed = b64.trim();
        const padded = trimmed + "=".repeat((4 - (trimmed.length % 4)) % 4);
        const binary = atob(padded);
        if (binary.length !== KEY_LEN) {
          throw new Error("Session key must decode to 32 bytes.");
        }
        const bytes = new Uint8Array(KEY_LEN);
        for (let i = 0; i < KEY_LEN; i++) bytes[i] = binary.charCodeAt(i);
        return bytes;
      }

      async function importAesKey(sessionKeyBytes) {
        return crypto.subtle.importKey(
          "raw",
          sessionKeyBytes,
          { name: "AES-GCM" },
          false,
          ["encrypt", "decrypt"]
        );
      }

      async function fileToBase64(file) {
        const buffer = await file.arrayBuffer();
        const bytes = new Uint8Array(buffer);
        let binary = "";
        for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        return btoa(binary);
      }

      async function buildEncryptedJob(sessionKeyBytes, payload) {
        const aesKey = await importAesKey(sessionKeyBytes);
        const nonce = crypto.getRandomValues(new Uint8Array(12));
        const plaintext = new TextEncoder().encode(JSON.stringify(payload));
        const ciphertext = new Uint8Array(
          await crypto.subtle.encrypt({ name: "AES-GCM", iv: nonce }, aesKey, plaintext)
        );

        const envelope = new Uint8Array(
          JOB_MAGIC.length + nonce.length + ciphertext.length
        );
        envelope.set(JOB_MAGIC, 0);
        envelope.set(nonce, JOB_MAGIC.length);
        envelope.set(ciphertext, JOB_MAGIC.length + nonce.length);
        return envelope;
      }

      async function decryptOutputBytes(sessionKeyBytes, blob) {
        const bytes = new Uint8Array(await blob.arrayBuffer());
        const magic = new TextDecoder().decode(bytes.slice(0, 8));
        if (magic !== OUT_MAGIC) throw new Error("Invalid encrypted output.");
        const nonce = bytes.slice(8, 20);
        const ciphertext = bytes.slice(20);
        const aesKey = await importAesKey(sessionKeyBytes);
        return new Uint8Array(
          await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: nonce },
            aesKey,
            ciphertext
          )
        );
      }

      async function checkStatus(sessionKeyBytes) {
        if (!currentJobId) return;
        const response = await fetch(`/api/status/${currentJobId}`);
        const body = await response.json();
        setStatus(JSON.stringify(body, null, 2));

        if (body.status === "done") {
          clearInterval(pollTimer);
          pollTimer = null;
          const resultResp = await fetch(`/api/result/${currentJobId}`);
          if (!resultResp.ok) {
            setStatus("Job done but encrypted result missing.");
            return;
          }
          const plain = await decryptOutputBytes(
            sessionKeyBytes,
            await resultResp.blob()
          );
          hideResults();

          const kind = body.output_kind || "image";
          if (kind === "text") {
            const text = new TextDecoder().decode(plain);
            setStatus(`Job ${currentJobId} complete.\n\n${text}`);
          } else if (kind === "audio") {
            const mime = body.output_mime || "audio/wav";
            audioPreviewEl.src = URL.createObjectURL(
              new Blob([plain], { type: mime })
            );
            audioPreviewEl.style.display = "block";
            setStatus(`Job ${currentJobId} complete. Audio decrypted in your browser.`);
          } else if (kind === "model3d") {
            const mime = body.output_mime || "model/gltf-binary";
            const blob = new Blob([plain], { type: mime });
            downloadLinkEl.href = URL.createObjectURL(blob);
            downloadLinkEl.download = "result.glb";
            downloadLinkEl.style.display = "inline-block";
            downloadLinkEl.textContent = "Download 3D result (GLB)";
            setStatus(`Job ${currentJobId} complete. 3D model ready to download.`);
          } else {
            previewEl.src = URL.createObjectURL(
              new Blob([plain], { type: body.output_mime || "image/png" })
            );
            previewEl.style.display = "block";
            setStatus(`Job ${currentJobId} complete. Result decrypted in your browser.`);
          }
        } else if (body.status === "failed") {
          clearInterval(pollTimer);
          pollTimer = null;
          setStatus(
            body.error
              ? `Job ${currentJobId} failed: ${body.error}`
              : `Job ${currentJobId} failed. Check GPU worker logs.`
          );
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        hideResults();

        let sessionKeyBytes;
        try {
          sessionKeyBytes = parseSessionKey(
            document.getElementById("sessionKey").value
          );
        } catch (err) {
          setStatus(err.message);
          return;
        }

        const spec = selectedModel();
        if (!spec) {
          setStatus("Select a model.");
          return;
        }

        const files = imagesInput.files;
        if (spec.image_mode === "required") {
          if (files.length < 1 || files.length > 2) {
            setStatus("This model requires 1 or 2 images.");
            return;
          }
        } else if (spec.image_mode === "optional" && files.length > 2) {
          setStatus("At most 2 images allowed.");
          return;
        }

        if (spec.requires_mesh && !meshInput.files.length) {
          setStatus("This model requires a 3D mesh file.");
          return;
        }

        const images = [];
        for (const file of files) {
          images.push({
            data_b64: await fileToBase64(file),
            mime: file.type || "application/octet-stream",
          });
        }

        const payload = {
          model: spec.id,
          prompt: document.getElementById("prompt").value.trim(),
          negative_prompt: document.getElementById("negative_prompt").value,
          seed: Number(document.getElementById("seed").value || 0),
          num_inference_steps: Number(
            document.getElementById("num_inference_steps").value || 4
          ),
          guidance_scale: Number(
            document.getElementById("guidance_scale").value || 1.0
          ),
          true_cfg_scale: Number(
            document.getElementById("true_cfg_scale").value || 1.0
          ),
          num_images_per_prompt: 1,
          images,
        };

        if (spec.ui?.show_audio_duration) {
          payload.audio_duration_s = Number(
            document.getElementById("audio_duration_s").value || 30
          );
        }
        if (spec.ui?.show_resolution) {
          payload.resolution = Number(
            document.getElementById("resolution").value || 1024
          );
        }
        if (spec.category === "mesh_texture") {
          payload.texture_size = Number(
            document.getElementById("texture_size").value || 4096
          );
        }

        if (spec.requires_mesh && meshInput.files.length) {
          const meshFile = meshInput.files[0];
          payload.mesh = {
            data_b64: await fileToBase64(meshFile),
            mime: meshFile.type || "application/octet-stream",
            filename: meshFile.name,
          };
        }

        if (spec.category !== "mesh_texture" && !payload.prompt) {
          setStatus("Prompt is required.");
          return;
        }

        submitBtn.disabled = true;
        setStatus("Encrypting job locally…");
        try {
          const envelope = await buildEncryptedJob(sessionKeyBytes, payload);
          setStatus("Uploading ciphertext…");
          const response = await fetch("/api/submit", {
            method: "POST",
            headers: { "Content-Type": "application/octet-stream" },
            body: envelope,
          });
          const body = await response.json();
          if (!response.ok) {
            setStatus(JSON.stringify(body, null, 2));
            return;
          }
          currentJobId = body.job_id;
          setStatus(JSON.stringify(body, null, 2));
          if (pollTimer) clearInterval(pollTimer);
          pollTimer = setInterval(() => checkStatus(sessionKeyBytes), 2000);
          await checkStatus(sessionKeyBytes);
        } catch (err) {
          setStatus(`Encryption/submit failed: ${err.message}`);
        } finally {
          submitBtn.disabled = false;
        }
      });

      loadModels().catch((err) => setStatus(err.message));
    </script>
  </body>
</html>
